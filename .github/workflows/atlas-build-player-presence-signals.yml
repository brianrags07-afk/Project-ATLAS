name: ATLAS Build 2024 Player Presence Signals

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "atlas/rosters/player_presence_signals.py"
      - "scripts/build_player_presence_signals.py"
      - "tests/test_player_presence_signals.py"
      - ".github/workflows/atlas-build-player-presence-signals.yml"
  pull_request:
    paths:
      - "atlas/rosters/player_presence_signals.py"
      - "scripts/build_player_presence_signals.py"
      - "tests/test_player_presence_signals.py"
      - ".github/workflows/atlas-build-player-presence-signals.yml"

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas pytest
      - run: python -m pytest tests/test_player_presence_signals.py -q

  build:
    if: github.event_name != 'pull_request'
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PYTHONPATH: ${{ github.workspace }}
      SNAPSHOT_PREFIX: gs://atlas-mlb-data-brian-4817/data/builds/roster-snapshots/mlb/2024/373485782fcde91aaa7a893305008ab64e0bf19e/29958608539/1
      OBSERVATION_PREFIX: gs://atlas-mlb-data-brian-4817/data/audits/roster-reconciliation/mlb/2024/4a2510bc0c103407ac48a31d314db202081c4374/29958077238/1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas pyarrow==23.0.1
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Download pinned certified sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p source build/2024
          gcloud storage cp "$SNAPSHOT_PREFIX/manifest.json" source/roster_snapshot_manifest.json
          gcloud storage cp "$SNAPSHOT_PREFIX/pregame_roster_snapshots.parquet" source/pregame_roster_snapshots.parquet
          gcloud storage cp "$SNAPSHOT_PREFIX/team_games.parquet" source/team_games.parquet
          gcloud storage cp "$OBSERVATION_PREFIX/manifest.json" source/player_observation_manifest.json
          gcloud storage cp "$OBSERVATION_PREFIX/player_observations.parquet" source/player_observations.parquet
      - name: Build and certify pregame player-presence evidence
        run: >-
          python scripts/build_player_presence_signals.py
          --season 2024
          --snapshots source/pregame_roster_snapshots.parquet
          --team-games source/team_games.parquet
          --snapshot-manifest source/roster_snapshot_manifest.json
          --observations source/player_observations.parquet
          --observation-manifest source/player_observation_manifest.json
          --output build/2024
      - name: Publish immutable build with readback verification
        env:
          DEST: gs://atlas-mlb-data-brian-4817/data/builds/player-presence/mlb/2024/${{ github.sha }}/${{ github.run_id }}/${{ github.run_attempt }}/
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p readback
          for source in build/2024/*; do
            artifact="$(basename "$source")"
            gcloud storage cp --no-clobber "$source" "${DEST}${artifact}"
            gcloud storage cp "${DEST}${artifact}" "readback/${artifact}"
            cmp --silent "$source" "readback/${artifact}"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: atlas-2024-player-presence-signals-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/2024/
          retention-days: 90
