name: ATLAS Cloud Data Test

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test-cloud-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: List ATLAS bucket contents
        run: |
          gcloud storage ls gs://atlas-mlb-data-brian-4817

      - name: Download ATLAS master datasets
        run: |
          mkdir -p data/master
          gcloud storage cp \
            gs://atlas-mlb-data-brian-4817/data/master/master_game_database.parquet \
            data/master/master_game_database.parquet
          gcloud storage cp \
            gs://atlas-mlb-data-brian-4817/data/master/master_pitch_database.parquet \
            data/master/master_pitch_database.parquet
          gcloud storage cp \
            gs://atlas-mlb-data-brian-4817/data/master/master_game_database_metadata.json \
            data/master/master_game_database_metadata.json
          gcloud storage cp \
            gs://atlas-mlb-data-brian-4817/data/master/team_game_state.parquet \
            data/master/team_game_state.parquet

      - name: Verify ATLAS master datasets
        run: |
          for f in \
            data/master/master_game_database.parquet \
            data/master/master_pitch_database.parquet \
            data/master/master_game_database_metadata.json \
            data/master/team_game_state.parquet; do
            if [ ! -f "$f" ]; then
              echo "Missing expected file: $f" >&2
              exit 1
            fi
          done
          echo "All expected ATLAS master datasets are present."
          ls -la data/master/
