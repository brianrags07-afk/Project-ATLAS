name: ATLAS Historical Schedule Build

on:
  pull_request:
    paths:
      - "atlas/schedule/**"
      - "scripts/build_historical_schedule.py"
      - "tests/test_mlb_schedule_reference.py"
      - "tests/test_schedule_builder.py"
      - "tests/test_schedule_history.py"
      - "tests/test_schedule_fixture_certification.py"
      - ".github/workflows/atlas-build-schedule.yml"
  workflow_dispatch:
    inputs:
      season:
        description: "One MLB season (kept isolated from every other season)"
        required: true
        default: "2025"
        type: string

permissions:
  contents: read

concurrency:
  group: atlas-schedule-${{ inputs.season || 'tests' }}
  cancel-in-progress: false

jobs:
  schedule-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas pyarrow==23.0.1 pytest requests

      - name: Run schedule tests
        run: python -m pytest tests/test_mlb_schedule_reference.py tests/test_schedule_builder.py tests/test_schedule_history.py tests/test_schedule_fixture_certification.py -q

  publish-schedule:
    if: github.event_name == 'workflow_dispatch'
    needs: schedule-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PYTHONPATH: ${{ github.workspace }}
      SEASON: ${{ inputs.season }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas pyarrow==23.0.1 requests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate isolated season input
        shell: bash
        run: |
          set -euo pipefail
          [[ "$SEASON" =~ ^20[0-9]{2}$ ]] || {
            echo "Season must be one four-digit MLB season."
            exit 1
          }

      - name: Build one historical schedule
        run: |
          mkdir -p "build/$SEASON"
          python scripts/build_historical_schedule.py \
            --season "$SEASON" \
            --output "build/$SEASON/"

      - name: Verify manifest contains only the requested season
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          season = int(os.environ["SEASON"])
          manifest = json.loads(
              Path(f"build/{season}/schedule_manifest.json").read_text()
          )
          assert manifest["seasons"] == [season], manifest["seasons"]
          assert manifest["required_game_type"] == "R"
          PY

      - name: Publish immutable season-addressed schedule artifacts
        env:
          GCS_DESTINATION: gs://atlas-mlb-data-brian-4817/data/builds/schedules/mlb/${{ inputs.season }}/${{ github.sha }}/${{ github.run_id }}/${{ github.run_attempt }}/
        run: |
          set -euo pipefail
          gcloud storage cp --recursive --no-clobber "build/$SEASON/" "$GCS_DESTINATION"
          for artifact in canonical_schedule.parquet schedule_history.parquet rescheduled_games_audit.csv schedule_validation.json schedule_manifest.json; do
            gcloud storage ls "${GCS_DESTINATION}${artifact}"
          done

      - name: Upload isolated schedule artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlas-${{ inputs.season }}-historical-schedule-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/${{ inputs.season }}/
          retention-days: 90
