name: ATLAS Historical Schedule Build

on:
  pull_request:
    paths:
      - "atlas/schedule/**"
      - "scripts/build_historical_schedule.py"
      - "tests/test_mlb_schedule_reference.py"
      - "tests/test_schedule_builder.py"
      - "tests/test_schedule_history.py"
      - "tests/test_schedule_fixture_certification.py"
      - ".github/workflows/atlas-build-schedule.yml"
  workflow_dispatch:
    inputs:
      seasons:
        description: "Comma-separated MLB seasons"
        required: true
        default: "2024"

permissions:
  contents: read

jobs:
  schedule-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas pyarrow==23.0.1 pytest requests

      - name: Run schedule tests
        run: python -m pytest tests/test_mlb_schedule_reference.py tests/test_schedule_builder.py tests/test_schedule_history.py tests/test_schedule_fixture_certification.py -q

  publish-schedule:
    if: github.event_name == 'workflow_dispatch'
    needs: schedule-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas pyarrow==23.0.1 requests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build historical schedules
        env:
          SEASONS: ${{ inputs.seasons }}
        run: |
          mkdir -p build
          args=()
          IFS=',' read -ra season_list <<< "$SEASONS"
          for season in "${season_list[@]}"; do args+=(--season "$season"); done
          python scripts/build_historical_schedule.py "${args[@]}" --output build/

      - name: Publish validated schedule artifacts to GCS
        env:
          GCS_DESTINATION: gs://atlas-mlb-data-brian-4817/builds/schedule/${{ github.sha }}/
        run: |
          gcloud storage cp --recursive build/ "$GCS_DESTINATION"
          for artifact in canonical_schedule.parquet schedule_history.parquet rescheduled_games_audit.csv schedule_validation.json schedule_manifest.json; do
            gcloud storage ls "${GCS_DESTINATION}${artifact}"
          done

      - name: Upload schedule artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlas-historical-schedule
          path: build/
